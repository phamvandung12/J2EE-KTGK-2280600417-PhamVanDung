<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thêm học phần mới</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .auth-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            color: white;
        }

        .auth-left a {
            color: white;
            text-decoration: none;
            font-weight: 600;
        }

        .auth-right {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            background: rgba(0, 0, 0, 0.2);
            padding: 6px;
            border-radius: 8px;
        }

        .auth-user {
            background: rgba(0, 0, 0, 0.2);
            padding: 6px 10px;
            border-radius: 6px;
        }

        .auth-btn {
            border: none;
            background: #1f2937;
            color: white;
            border-radius: 6px;
            padding: 8px 12px;
            cursor: pointer;
            text-decoration: none;
            font-size: 13px;
            font-family: inherit;
        }

        .auth-btn:hover {
            background: #111827;
        }

        .logout-form {
            margin: 0;
        }
        
        .card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        h1 {
            color: #1a1a2e;
            font-size: 28px;
            margin-bottom: 10px;
            text-align: center;
        }
        
        .subtitle {
            text-align: center;
            color: #6b7280;
            margin-bottom: 30px;
            font-size: 14px;
        }
        
        .form-group {
            margin-bottom: 25px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            color: #374151;
            font-weight: 600;
            font-size: 14px;
        }
        
        label .required {
            color: #ef4444;
            margin-left: 3px;
        }
        
        input[type="text"],
        input[type="number"],
        input[type="file"],
        select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
            font-family: inherit;
        }
        
        input[type="text"]:focus,
        input[type="number"]:focus,
        input[type="file"]:focus,
        select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        input.error,
        select.error {
            border-color: #ef4444;
        }
        
        .error-message {
            color: #ef4444;
            font-size: 13px;
            margin-top: 5px;
            display: block;
        }
        
        .help-text {
            color: #6b7280;
            font-size: 12px;
            margin-top: 5px;
            display: block;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 35px;
        }
        
        .btn {
            flex: 1;
            padding: 14px 20px;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            display: inline-block;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-secondary {
            background-color: #6b7280;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #4b5563;
        }
        
        .file-input-wrapper {
            position: relative;
        }
        
        input[type="file"] {
            cursor: pointer;
        }
        
        .alert {
            padding: 12px 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
        }
        
        .alert-info {
            background-color: #dbeafe;
            border-left: 4px solid #3b82f6;
            color: #1e40af;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="auth-bar">
            <div class="auth-left">
                <a th:href="@{/courses}">← Quay lai danh sach</a>
            </div>
            <div class="auth-right">
                <span th:if="${authenticated}" class="auth-user">
                    Xin chao, <strong th:text="${currentUsername}"></strong>
                </span>
                <a th:if="${!authenticated}" th:href="@{/login}" class="auth-btn">Dang nhap</a>
                <form th:if="${authenticated}" th:action="@{/logout}" method="post" class="logout-form">
                    <button type="submit" class="auth-btn">Dang xuat</button>
                </form>
            </div>
        </div>

        <div class="card">
            <h1>Thêm học phần mới</h1>
            <p class="subtitle">Vui lòng điền đầy đủ thông tin học phần</p>
            
            <div class="alert alert-info">
                <strong>Lưu ý:</strong> Tên học phần, số tín chỉ và giảng viên không được để trống.
            </div>
            
            <form th:action="@{/courses/add}" th:object="${product}" method="post" enctype="multipart/form-data">
                <div class="form-group">
                    <label for="productCode">
                        Mã học phần <span class="required">*</span>
                    </label>
                    <input type="text" 
                           id="productCode" 
                           th:field="*{productCode}" 
                           th:classappend="${#fields.hasErrors('productCode')} ? 'error' : ''"
                           placeholder="Nhập mã học phần (VD: CP001)">
                    <span class="error-message" th:if="${#fields.hasErrors('productCode')}" th:errors="*{productCode}"></span>
                </div>
                
                <div class="form-group">
                    <label for="name">
                        Tên học phần <span class="required">*</span>
                    </label>
                    <input type="text" 
                           id="name" 
                           th:field="*{name}" 
                           th:classappend="${#fields.hasErrors('name')} ? 'error' : ''"
                           placeholder="Nhập tên học phần">
                    <span class="error-message" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
                    <span class="help-text">Tên học phần không được để trống</span>
                </div>
                
                <div class="form-group">
                    <label for="price">
                        Số tín chỉ <span class="required">*</span>
                    </label>
                    <input type="number" 
                           id="price" 
                           th:field="*{price}" 
                           th:classappend="${#fields.hasErrors('price')} ? 'error' : ''"
                           placeholder="Nhập số tín chỉ"
                           min="1"
                           max="9999999">
                    <span class="error-message" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></span>
                    <span class="help-text">Số tín chỉ phải lớn hơn 0</span>
                </div>

                <div class="form-group">
                    <label for="lecturer">
                        Giảng viên phụ trách <span class="required">*</span>
                    </label>
                    <input type="text"
                           id="lecturer"
                           th:field="*{lecturer}"
                           th:classappend="${#fields.hasErrors('lecturer')} ? 'error' : ''"
                           placeholder="Nhập tên giảng viên">
                    <span class="error-message" th:if="${#fields.hasErrors('lecturer')}" th:errors="*{lecturer}"></span>
                </div>
                
                <div class="form-group">
                    <label for="category">
                        Danh mục <span class="required">*</span>
                    </label>
                    <select id="category" 
                            th:field="*{category}" 
                            th:classappend="${#fields.hasErrors('category')} ? 'error' : ''"
                            required>
                        <option value="">Chọn danh mục</option>
                        <option th:each="cat : ${categories}" 
                                th:value="${cat.id}" 
                                th:text="${cat.name}"></option>
                    </select>
                    <span class="error-message" th:if="${#fields.hasErrors('category')}" th:errors="*{category}"></span>
                </div>
                
                <div class="form-group">
                    <label for="image">
                        Hình ảnh minh họa
                    </label>
                    <div class="file-input-wrapper">
                        <input type="file" 
                               id="image" 
                               name="image" 
                               accept="image/*"
                               th:classappend="${#fields.hasErrors('imageName')} ? 'error' : ''">
                    </div>
                    <span class="error-message" th:if="${#fields.hasErrors('imageName')}" th:errors="*{imageName}"></span>
                    <span class="help-text">Chọn hình ảnh minh họa cho học phần (nếu có)</span>
                </div>
                
                <div class="button-group">
                    <button type="submit" class="btn btn-primary">Thêm học phần</button>
                    <a href="/courses" class="btn btn-secondary">Hủy bỏ</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        // Hiển thị tên file khi chọn
        document.getElementById('image').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            if (fileName) {
                console.log('Selected file:', fileName);
            }
        });
    </script>
</body>
</html>
